databases:
  - name: factorynerve-db
    plan: free
    databaseName: factorynerve
    user: factorynerve

services:
  - type: web
    name: factorynerve-api
    runtime: docker
    plan: free
    dockerfilePath: ./deploy/render/backend.Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /observability/ready
    envVars:
      - key: APP_NAME
        value: FactoryNerve
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
      - key: WEB_APP_URL
        value: https://factorynerve.online
      - key: EMAIL_VERIFICATION_BASE_URL
        value: https://factorynerve.online/verify-email?token=
      - key: PASSWORD_RESET_BASE_URL
        value: https://factorynerve.online/reset-password?token=
      - key: EMAIL_VERIFICATION_EXPOSE_LINK
        value: "false"
      - key: PASSWORD_RESET_EXPOSE_LINK
        value: "false"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_EXPIRE_HOURS
        value: "24"
      - key: JWT_ACCESS_COOKIE
        value: dpr_access
      - key: JWT_REFRESH_COOKIE
        value: dpr_refresh
      - key: JWT_CSRF_COOKIE
        value: dpr_csrf
      - key: JWT_CSRF_HEADER
        value: X-CSRF-Token
      - key: JWT_COOKIE_SAMESITE
        value: Lax
      - key: JWT_COOKIE_SECURE
        value: "1"
      - key: JWT_COOKIE_DOMAIN
        value: factorynerve.online
      - key: JWT_COOKIE_PATH
        value: /
      - key: CORS_ALLOWED_ORIGINS
        value: https://factorynerve.online,https://www.factorynerve.online
      - key: CORS_ALLOW_CREDENTIALS
        value: "true"
      - key: FORCE_HTTPS
        value: "true"
      - key: TRUST_PROXY
        value: "true"
      - key: HSTS_MAX_AGE
        value: "31536000"
      - key: DATABASE_URL
        fromDatabase:
          name: factorynerve-db
          property: connectionString
      - key: DATA_ENCRYPTION_KEY
        sync: false
      - key: DB_POOL_SIZE
        value: "10"
      - key: DB_POOL_OVERFLOW
        value: "20"
      - key: DB_POOL_TIMEOUT
        value: "30"
      - key: DB_POOL_RECYCLE
        value: "1800"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "120"
      - key: MAX_REQUEST_BYTES
        value: "12000000"
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USE_SSL
        value: "false"
      - key: SMTP_DRY_RUN
        value: "false"
      - key: EMAIL_VERIFICATION_EMAIL_SUBJECT
        value: Verify your FactoryNerve email
      - key: PASSWORD_RESET_EMAIL_SUBJECT
        value: Reset your FactoryNerve password
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: NEXT_PUBLIC_RELEASE_VERSION
        value: render-bootstrap
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENV
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
